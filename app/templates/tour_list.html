<section class="tour-list mb-5">
    <h2 class="text-center mb-4">Популярные туры</h2>
    <div class="row row-cols-1 row-cols-md-3 g-4">
        
        <!-- Карточка 1: Тур в США -->
        <div class="col">
            <div class="card shadow-lg h-100 d-flex flex-column tour-card" id="tour-card-1">
                <img src="https://s0.rbk.ru/v6_top_pics/media/img/4/37/756650198563374.jpg" class="card-img-top zoom-image" alt="США">
                <div class="card-body flex-grow-1 d-flex flex-column">
                    <h5 class="card-title">Тур в США</h5>
                    <p class="card-text flex-grow-1">Исследуйте США с нашими эксклюзивными предложениями.</p>
                    <button class="btn btn-primary mt-auto btn-details" 
                            data-bs-toggle="popover" 
                            data-bs-placement="top" 
                            data-title="Тур в США" 
                            data-duration="Продолжительность: 7 дней" 
                            data-price="Цена: от $1000" 
                            data-includes="Включает: перелет, отель, экскурсии">
                        Подробнее
                    </button>
                </div>
            </div>
        </div>

        <!-- Карточка 2: Тур в Японию -->
        <div class="col">
            <div class="card shadow-lg h-100 d-flex flex-column tour-card" id="tour-card-2">
                <img src="https://cdn.culture.ru/images/0d51a12a-18f8-58a4-8e87-34cb662f787e" class="card-img-top zoom-image" alt="Япония">
                <div class="card-body flex-grow-1 d-flex flex-column">
                    <h5 class="card-title">Тур в Японию</h5>
                    <p class="card-text flex-grow-1">Откройте для себя культуру и природу Японии с нашими экскурсиями и турами.</p>
                    <button class="btn btn-primary mt-auto btn-details" 
                            data-bs-toggle="popover" 
                            data-bs-placement="top" 
                            data-title="Тур в Японию" 
                            data-duration="Продолжительность: 10 дней" 
                            data-price="Цена: от $1500" 
                            data-includes="Включает: перелет, проживание, экскурсии, еда">
                        Подробнее
                    </button>
                </div>
            </div>
        </div>

        <!-- Карточка 3: Тур во Францию -->
        <div class="col">
            <div class="card shadow-lg h-100 d-flex flex-column tour-card" id="tour-card-3">
                <img src="https://assets.weforum.org/article/image/responsive_big_0NQECr3DnJfvRwDomIEUswvauuOd-8CrR5A9loomDX8.jpg" class="card-img-top zoom-image" alt="Франция">
                <div class="card-body flex-grow-1 d-flex flex-column">
                    <h5 class="card-title">Тур во Францию</h5>
                    <p class="card-text flex-grow-1">Насладитесь красотами Парижа, Лазурного берега и другими жемчужинами Франции.</p>
                    <button class="btn btn-primary mt-auto btn-details" 
                            data-bs-toggle="popover" 
                            data-bs-placement="top" 
                            data-title="Тур во Францию" 
                            data-duration="Продолжительность: 8 дней" 
                            data-price="Цена: от $1200" 
                            data-includes="Включает: перелет, отель, экскурсии по Парижу и Ницце, еда">
                        Подробнее
                    </button>
                </div>
            </div>
        </div>
        
    </div>
</section>
